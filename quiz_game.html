<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズゲーム</title>
  <style>
    :root {
      --bg: #eef1f4;
      --card: #ffffff;
      --surface: #f7f8fa;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #4b5563;
      --primary-hover: #374151;
      --primary-text: #ffffff;
      --success: #166534;
      --shadow: 0 18px 40px rgba(31, 41, 55, 0.12);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(75, 85, 99, 0.08), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .quiz-card {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .topbar strong {
      color: var(--text);
      font-size: 15px;
    }

    .question {
      margin: 0 0 16px;
      padding: 18px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 1.1rem;
      line-height: 1.7;
      min-height: 92px;
      display: flex;
      align-items: center;
    }

    .answer-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .answer-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    .answer-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(75, 85, 99, 0.16);
    }

    .button {
      border: 0;
      border-radius: 10px;
      padding: 0 18px;
      min-height: 48px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: var(--primary-text);
      transition: background-color 0.15s ease, transform 0.15s ease;
      white-space: nowrap;
    }

    .button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .button:active:not(:disabled) {
      transform: translateY(1px);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .status {
      min-height: 28px;
      margin-top: 14px;
      color: var(--success);
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="quiz-card" aria-label="クイズゲーム">
    <div class="topbar">
      <div id="progressText">問題 0 / 5</div>
      <div id="scoreText">スコア: 0</div>
    </div>

    <p id="questionText" class="question">スタートボタンを押して開始してください。</p>

    <div class="answer-row">
      <input id="answerInput" type="text" placeholder="答えを入力" disabled>
      <button id="submitButton" class="button hidden" type="button" onclick="submitAnswer()">回答</button>
    </div>

    <div class="actions">
      <button id="startButton" class="button" type="button" onclick="startGame()">スタート</button>
      <button id="resetButton" class="button hidden" type="button" onclick="resetGame()">もう一度</button>
    </div>

    <div id="statusText" class="status" aria-live="polite"></div>
  </main>

  <script>
    const questions = [
      { question: "日本の首都は？", answer: "東京" },
      { question: "フランスの首都は？", answer: "パリ" },
      { question: "アメリカの首都は？", answer: "ワシントン" },
      { question: "中国の首都は？", answer: "北京" },
      { question: "インドの首都は？", answer: "ニューデリー" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isPlaying = false;

    const progressText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const submitButton = document.getElementById("submitButton");
    const startButton = document.getElementById("startButton");
    const resetButton = document.getElementById("resetButton");
    const statusText = document.getElementById("statusText");

    function updateHeader() {
      progressText.textContent = `問題 ${Math.min(currentQuestionIndex + 1, questions.length)} / ${questions.length}`;
      scoreText.textContent = `スコア: ${score}`;
    }

    function startGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = true;

      startButton.classList.add("hidden");
      resetButton.classList.add("hidden");
      submitButton.classList.remove("hidden");
      answerInput.disabled = false;
      submitButton.disabled = false;
      answerInput.value = "";
      statusText.textContent = "";

      updateHeader();
      showQuestion();
      answerInput.focus();
    }

    function showQuestion() {
      if (!isPlaying || currentQuestionIndex >= questions.length) {
        return;
      }

      const current = questions[currentQuestionIndex];
      questionText.textContent = current.question;
      progressText.textContent = `問題 ${currentQuestionIndex + 1} / ${questions.length}`;
      scoreText.textContent = `スコア: ${score}`;
      answerInput.value = "";
      answerInput.focus();
    }

    function submitAnswer() {
      if (!isPlaying) {
        return;
      }

      const current = questions[currentQuestionIndex];
      const userAnswer = answerInput.value.trim();
      const correctAnswer = current.answer.trim();

      if (userAnswer === correctAnswer) {
        score += 1;
        statusText.textContent = "正解です。";
      } else {
        statusText.textContent = `不正解です。正解は「${current.answer}」です。`;
      }

      currentQuestionIndex += 1;
      updateHeader();

      if (currentQuestionIndex >= questions.length) {
        finishGame();
        return;
      }

      showQuestion();
    }

    function finishGame() {
      isPlaying = false;
      questionText.textContent = `全問終了です。最終スコアは ${score} 点でした。`;
      answerInput.disabled = true;
      submitButton.disabled = true;
      submitButton.classList.add("hidden");
      resetButton.classList.remove("hidden");
      startButton.classList.add("hidden");
      statusText.textContent = "ゲームを終了しました。";
      progressText.textContent = `問題 ${questions.length} / ${questions.length}`;
      scoreText.textContent = `スコア: ${score}`;
    }

    function resetGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = false;

      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      submitButton.classList.add("hidden");
      resetButton.classList.add("hidden");
      startButton.classList.remove("hidden");
      questionText.textContent = "スタートボタンを押して開始してください。";
      statusText.textContent = "";
      progressText.textContent = `問題 0 / ${questions.length}`;
      scoreText.textContent = "スコア: 0";
    }

    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !submitButton.disabled && !submitButton.classList.contains("hidden")) {
        submitAnswer();
      }
    });

    resetGame();
  </script>
</body>
</html>
