<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電卓</title>
  <style>
    :root {
      --page: #1d4d7a;
      --page-accent: #ffcf6a;
      --card: #fff8ef;
      --screen: #fffdf8;
      --screen-soft: #ffeec8;
      --text: #37405f;
      --button-text: #2d3350;
      --muted: #6c6f8e;
      --line: #f4b4cf;
      --number: #ffe66d;
      --number-hover: #fff08f;
      --operator: #7dd8cf;
      --operator-hover: #9eeae4;
      --equals: #ff86b6;
      --equals-hover: #ffa6c8;
      --clear: #ffb45e;
      --clear-hover: #ffc985;
      --shadow: 0 22px 46px rgba(77, 51, 75, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.72) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 28%, rgba(125, 216, 207, 0.56) 0 5px, transparent 6px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.28) 0 25%, transparent 25% 50%, rgba(255, 134, 182, 0.16) 50% 75%, transparent 75%),
        linear-gradient(160deg, #78d9d4 0%, var(--page-accent) 52%, #ff92bc 100%);
      background-size: 120px 120px, 150px 150px, 34px 34px, auto;
      font-family: "Arial Rounded MT Bold", "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    }

    .calculator {
      width: min(100%, 360px);
      padding: 16px;
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .display {
      min-height: 112px;
      margin-bottom: 14px;
      padding: 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 134, 182, 0.18), transparent 38%),
        linear-gradient(180deg, var(--screen), var(--screen-soft));
      border: 2px dashed rgba(255, 134, 182, 0.62);
      box-shadow: inset 0 -8px 0 rgba(255, 180, 94, 0.12);
    }

    .expression,
    .result {
      min-width: 0;
      text-align: right;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .expression {
      min-height: 22px;
      padding: 6px 12px;
      align-self: flex-end;
      border-radius: 999px;
      color: #6870a8;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
      font-size: 0.94rem;
      font-weight: 900;
      line-height: 1.35;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 241, 208, 0.86));
      box-shadow:
        inset 0 -3px 0 rgba(255, 180, 94, 0.22),
        0 4px 10px rgba(255, 182, 94, 0.12);
    }

    .result {
      min-height: 44px;
      font-size: clamp(2rem, 10vw, 2.7rem);
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0;
      color: #ff6fa8;
      text-shadow:
        0 1px 0 #ffffff,
        0 3px 0 #fff2a6,
        0 6px 0 rgba(125, 216, 207, 0.34),
        0 12px 18px rgba(255, 111, 168, 0.24);
    }

    .result.is-popping {
      animation: number-pop 0.18s ease-out;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 10px;
      margin-bottom: 14px;
    }

    .btn {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 0;
      aspect-ratio: 1;
      border: 0;
      border-radius: 8px;
      color: var(--button-text);
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-size: 1.28rem;
      font-weight: 900;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.68);
      transition: transform 0.08s ease;
      z-index: 0;
      isolation: isolate;
      overflow: visible;
    }

    .btn::before {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      content: "★";
      color: var(--number);
      font-size: clamp(3.25rem, 17vw, 4.4rem);
      line-height: 1;
      filter:
        drop-shadow(0 8px 0 rgba(45, 51, 80, 0.12))
        drop-shadow(0 12px 14px rgba(255, 134, 182, 0.16));
      pointer-events: none;
      transition: filter 0.15s ease, transform 0.08s ease;
      z-index: -1;
    }

    .btn:hover {
      transform: translateY(-2px) rotate(-2deg);
    }

    .btn:hover::before {
      filter:
        brightness(1.06)
        saturate(1.08)
        drop-shadow(0 8px 0 rgba(45, 51, 80, 0.12))
        drop-shadow(0 12px 14px rgba(255, 134, 182, 0.16));
    }

    .btn:focus-visible {
      outline: 3px solid #68b9b0;
      outline-offset: 2px;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:active::before {
      transform: translateY(3px);
      filter: drop-shadow(0 3px 0 rgba(45, 51, 80, 0.12));
    }

    .sparkle {
      position: absolute;
      left: 50%;
      top: 50%;
      font-size: 1rem;
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.4);
      animation: sparkle-burst 560ms ease-out forwards;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
      z-index: 2;
    }

    .btn[data-action="number"][data-value="0"] {
      --number: #ffea7a;
    }

    .btn[data-action="number"][data-value="1"],
    .btn[data-action="number"][data-value="6"] {
      --number: #ff9fc7;
    }

    .btn[data-action="number"][data-value="2"],
    .btn[data-action="number"][data-value="7"] {
      --number: #8fe4dc;
    }

    .btn[data-action="number"][data-value="3"],
    .btn[data-action="number"][data-value="8"] {
      --number: #ffd36e;
    }

    .btn[data-action="number"][data-value="4"],
    .btn[data-action="number"][data-value="9"] {
      --number: #b8a9ff;
    }

    .btn[data-action="number"][data-value="5"],
    .btn[data-action="number"][data-value="."] {
      --number: #ffb06b;
    }

    .btn-operator::before {
      color: var(--operator);
    }

    .btn-operator:hover {
      filter: brightness(1.07) saturate(1.05);
    }

    .btn-equals {
      color: var(--button-text);
    }

    .btn-equals::before {
      color: var(--equals);
    }

    .btn-equals:hover {
      filter: brightness(1.07) saturate(1.05);
    }

    .btn-clear {
      color: var(--button-text);
    }

    .btn-clear::before {
      color: var(--clear);
    }

    .btn-clear:hover {
      filter: brightness(1.07) saturate(1.05);
    }

    .span-two {
      grid-column: span 2;
      max-width: 82px;
      width: 100%;
      justify-self: center;
    }

    .history {
      min-height: 108px;
      padding: 12px;
      border: 2px solid rgba(125, 216, 207, 0.46);
      border-radius: 8px;
      background:
        radial-gradient(circle at top right, rgba(255, 210, 117, 0.22), transparent 28%),
        linear-gradient(180deg, #ffffff, #fff8ef);
      box-shadow: inset 0 -6px 0 rgba(125, 216, 207, 0.12);
    }

    .history-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 10px;
      padding: 5px 10px;
      border-radius: 999px;
      color: #ff6fa8;
      font-size: 0.84rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      background: rgba(255, 224, 238, 0.92);
      box-shadow: inset 0 -2px 0 rgba(255, 180, 94, 0.2);
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
    }

    .history-title::before {
      content: "★";
      color: #7dd8cf;
    }

    .history-list {
      list-style: none;
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      color: #5a628a;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
      font-size: 0.98rem;
      font-weight: 800;
    }

    .history-list li {
      padding: 8px 10px 9px;
      border-bottom: 1px dashed rgba(244, 180, 207, 0.72);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 245, 250, 0.92));
      box-shadow: inset 0 -2px 0 rgba(255, 180, 94, 0.14);
      text-align: right;
      overflow-wrap: anywhere;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .history-list li:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .history-empty {
      padding: 10px 12px 11px;
      color: #ff79ad;
      text-align: center;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Hiragino Maru Gothic ProN", sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      background: linear-gradient(180deg, rgba(255, 240, 248, 0.98), rgba(241, 253, 251, 0.98));
      border: 2px dashed rgba(255, 159, 199, 0.72);
      box-shadow:
        inset 0 -2px 0 rgba(125, 216, 207, 0.16),
        0 6px 14px rgba(255, 180, 94, 0.12);
    }

    .history-empty::before {
      content: "☆ ";
      color: #ff9fc7;
    }

    .history-empty::after {
      content: " ☆";
      color: #7dd8cf;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      .calculator {
        padding: 14px;
      }

      .pad {
        gap: 8px;
      }

      .span-two {
        max-width: 76px;
      }
    }

    @keyframes number-pop {
      0% {
        transform: scale(0.96);
      }

      70% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes sparkle-burst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(0, 0) scale(0.4) rotate(0deg);
      }

      15% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform:
          translate(-50%, -50%)
          translate(var(--spark-x), var(--spark-y))
          scale(1)
          rotate(var(--spark-rotate));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .result.is-popping,
      .sparkle {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="電卓">
    <section class="display" aria-live="polite">
      <div id="expression" class="expression"></div>
      <div id="result" class="result">0</div>
    </section>

    <section class="pad" aria-label="計算ボタン">
      <button class="btn btn-clear span-two" type="button" data-action="clear">C</button>
      <button class="btn btn-operator" type="button" data-action="operator" data-value="÷">÷</button>
      <button class="btn btn-operator" type="button" data-action="operator" data-value="×">×</button>

      <button class="btn" type="button" data-action="number" data-value="7">7</button>
      <button class="btn" type="button" data-action="number" data-value="8">8</button>
      <button class="btn" type="button" data-action="number" data-value="9">9</button>
      <button class="btn btn-operator" type="button" data-action="operator" data-value="-">−</button>

      <button class="btn" type="button" data-action="number" data-value="4">4</button>
      <button class="btn" type="button" data-action="number" data-value="5">5</button>
      <button class="btn" type="button" data-action="number" data-value="6">6</button>
      <button class="btn btn-operator" type="button" data-action="operator" data-value="+">+</button>

      <button class="btn" type="button" data-action="number" data-value="1">1</button>
      <button class="btn" type="button" data-action="number" data-value="2">2</button>
      <button class="btn" type="button" data-action="number" data-value="3">3</button>
      <button class="btn btn-equals" type="button" data-action="equals">=</button>

      <button class="btn span-two" type="button" data-action="number" data-value="0">0</button>
      <button class="btn" type="button" data-action="number" data-value=".">.</button>
      <button class="btn btn-clear" type="button" data-action="backspace">⌫</button>
    </section>

    <section class="history" aria-label="計算履歴">
      <p class="history-title">直近5件</p>
      <ol id="historyList" class="history-list">
        <li class="history-empty">まだ履歴はありません</li>
      </ol>
    </section>
  </main>

  <script>
    const expressionDisplay = document.getElementById("expression");
    const resultDisplay = document.getElementById("result");
    const historyList = document.getElementById("historyList");
    const buttons = document.querySelectorAll("[data-action]");

    let firstNumber = "";
    let operator = "";
    let waitingForSecondNumber = false;
    let shouldResetDisplay = false;
    let history = [];

    function getDisplayValue() {
      return resultDisplay.textContent;
    }

    function setDisplayValue(value) {
      resultDisplay.textContent = String(value);
      resultDisplay.classList.remove("is-popping");
      void resultDisplay.offsetWidth;
      resultDisplay.classList.add("is-popping");
    }

    function burstStars(button) {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      const starColors = ["#ff9fc7", "#8fe4dc", "#ffd36e", "#b8a9ff", "#ffb06b", "#ffea7a"];

      for (let index = 0; index < 10; index += 1) {
        const sparkle = document.createElement("span");
        const angle = (Math.PI * 2 * index) / 10 + (Math.PI / 20);
        const distance = 24 + (index % 3) * 9;
        const size = 0.82 + (index % 4) * 0.15;

        sparkle.className = "sparkle";
        sparkle.textContent = index % 3 === 0 ? "✦" : "★";
        sparkle.style.setProperty("--spark-x", `${Math.cos(angle) * distance}px`);
        sparkle.style.setProperty("--spark-y", `${Math.sin(angle) * distance}px`);
        sparkle.style.setProperty("--spark-rotate", `${-24 + index * 10}deg`);
        sparkle.style.color = starColors[index % starColors.length];
        sparkle.style.fontSize = `${size}rem`;

        sparkle.addEventListener("animationend", function () {
          sparkle.remove();
        });

        button.appendChild(sparkle);
      }
    }

    function formatResult(value) {
      const rounded = Number.isInteger(value) ? value : Number(value.toFixed(10));
      const text = String(rounded);

      if (text.length <= 14) {
        return text;
      }

      return rounded.toExponential(8).replace(/\.?0+e/, "e");
    }

    function formatOperator(value) {
      return value === "-" ? "−" : value;
    }

    function updateExpression(text = "") {
      expressionDisplay.textContent = text;
    }

    function clearAll() {
      firstNumber = "";
      operator = "";
      waitingForSecondNumber = false;
      shouldResetDisplay = false;
      setDisplayValue("0");
      updateExpression();
    }

    function inputNumber(value) {
      const current = getDisplayValue();
      const digitCount = current.replace("-", "").replace(".", "").length;

      if (shouldResetDisplay || waitingForSecondNumber) {
        setDisplayValue(value === "." ? "0." : value);
        shouldResetDisplay = false;
        waitingForSecondNumber = false;
        return;
      }

      if (value === "." && current.includes(".")) {
        return;
      }

      if (current === "0" && value !== ".") {
        setDisplayValue(value);
        return;
      }

      if (value !== "." && digitCount >= 14) {
        return;
      }

      setDisplayValue(current + value);
    }

    function chooseOperator(nextOperator) {
      const current = getDisplayValue();

      if (current === "エラー") {
        clearAll();
        return;
      }

      if (operator && !waitingForSecondNumber) {
        calculate(false);
      }

      firstNumber = getDisplayValue();
      operator = nextOperator;
      waitingForSecondNumber = true;
      shouldResetDisplay = false;
      updateExpression(`${firstNumber} ${formatOperator(operator)}`);
    }

    function addNumbers(a, b) {
      return a + b;
    }

    function subtractNumbers(a, b) {
      return a - b;
    }

    function multiplyNumbers(a, b) {
      return a * b;
    }

    function divideNumbers(a, b) {
      return a / b;
    }

    function calculate(rememberHistory = true) {
      if (!firstNumber || !operator || waitingForSecondNumber) {
        return;
      }

      const a = Number(firstNumber);
      const b = Number(getDisplayValue());

      if (!Number.isFinite(a) || !Number.isFinite(b)) {
        showError();
        return;
      }

      let answer;

      if (operator === "+") {
        answer = addNumbers(a, b);
      } else if (operator === "-") {
        answer = subtractNumbers(a, b);
      } else if (operator === "×") {
        answer = multiplyNumbers(a, b);
      } else if (operator === "÷") {
        if (b === 0) {
          showError();
          return;
        }
        answer = divideNumbers(a, b);
      }

      const fixedAnswer = formatResult(answer);
      const expressionText = `${firstNumber} ${formatOperator(operator)} ${b} =`;

      setDisplayValue(fixedAnswer);
      updateExpression(expressionText);

      if (rememberHistory) {
        addHistory(`${expressionText} ${fixedAnswer}`);
      }

      firstNumber = String(fixedAnswer);
      operator = "";
      waitingForSecondNumber = false;
      shouldResetDisplay = true;
    }

    function showError() {
      setDisplayValue("エラー");
      updateExpression();
      firstNumber = "";
      operator = "";
      waitingForSecondNumber = false;
      shouldResetDisplay = true;
    }

    function backspace() {
      const current = getDisplayValue();

      if (shouldResetDisplay || current === "エラー") {
        clearAll();
        return;
      }

      setDisplayValue(current.length > 1 ? current.slice(0, -1) : "0");
    }

    function addHistory(item) {
      history = [item, ...history].slice(0, 5);
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";

      if (history.length === 0) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "history-empty";
        emptyItem.textContent = "まだ履歴はありません";
        historyList.appendChild(emptyItem);
        return;
      }

      history.forEach(function (item) {
        const listItem = document.createElement("li");
        listItem.textContent = item;
        historyList.appendChild(listItem);
      });
    }

    buttons.forEach(function (button) {
      button.addEventListener("click", function () {
        burstStars(button);

        const action = button.dataset.action;
        const value = button.dataset.value;

        if (action === "number") {
          inputNumber(value);
        } else if (action === "operator") {
          chooseOperator(value);
        } else if (action === "equals") {
          calculate();
        } else if (action === "clear") {
          clearAll();
        } else if (action === "backspace") {
          backspace();
        }
      });
    });

    document.addEventListener("keydown", function (event) {
      const key = event.key;

      if (/^[0-9.]$/.test(key)) {
        inputNumber(key);
      } else if (["+", "-", "*", "/"].includes(key)) {
        chooseOperator(key === "*" ? "×" : key === "/" ? "÷" : key);
      } else if (key === "Enter" || key === "=") {
        event.preventDefault();
        calculate();
      } else if (key === "Escape" || key.toLowerCase() === "c") {
        clearAll();
      } else if (key === "Backspace") {
        backspace();
      }
    });

    clearAll();
  </script>
</body>
</html>
